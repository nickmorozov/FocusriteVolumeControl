name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: >
          xcodebuild -scheme FocusriteVolumeControl -configuration Release
          MACOSX_DEPLOYMENT_TARGET=15.0
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          build

      - name: Package DMG
        run: |
          BUILT_APP=$(find ~/Library/Developer/Xcode/DerivedData/FocusriteVolumeControl-* \
            -path "*/Build/Products/Release/FocusriteVolumeControl.app" -maxdepth 5 | head -1)
          mkdir -p build/dmg
          cp -R "$BUILT_APP" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create \
            -volname "Focusrite Volume Control" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/FocusriteVolumeControl.dmg

      - name: Compute DMG SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 build/FocusriteVolumeControl.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/FocusriteVolumeControl.dmg
          generate_release_notes: true
          body: |
            **Homebrew:**
            ```
            brew tap nickmorozov/focusrite-volume-control
            brew install --cask focusrite-control-2-volume
            ```

            **DMG SHA256:** `${{ steps.sha.outputs.sha256 }}`
